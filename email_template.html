<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 640px; margin: 0 auto; padding: 24px; color: #1d1d1f; line-height: 1.5; background: #fafafa; }
  .header { border-bottom: 2px solid #0052ff; padding-bottom: 12px; margin-bottom: 24px; }
  .header h1 { margin: 0 0 4px 0; font-size: 22px; }
  .header .meta { color: #666; font-size: 13px; }
  .item { background: #ffffff; border-radius: 8px; padding: 16px 20px; margin-bottom: 16px; border: 1px solid #e5e5e7; }
  .item .tag { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #0052ff; margin-bottom: 6px; }
  .item .tag.top { color: #ff3b30; }
  .item h2 { margin: 0 0 8px 0; font-size: 17px; font-weight: 600; }
  .item p { margin: 0 0 10px 0; font-size: 15px; color: #333; }
  .item .source { font-size: 12px; color: #888; }
  .item a { color: #0052ff; text-decoration: none; font-size: 14px; font-weight: 500; }
  .item a:hover { text-decoration: underline; }
  .footer { color: #888; font-size: 12px; text-align: center; margin-top: 32px; padding-top: 16px; border-top: 1px solid #e5e5e7; }
  .filtered { background: #f5f5f7; padding: 12px 16px; border-radius: 8px; font-size: 13px; color: #555; margin-top: 8px; }
  .filtered .label { font-weight: 600; margin-bottom: 6px; }
  .filtered .item-line { margin: 4px 0; }
  .videos-heading { font-size: 14px; font-weight: 600; color: #1d1d1f; margin: 32px 0 12px 0; letter-spacing: 0.3px; }
  .item .tag.video { color: #6e6e73; }
</style>
</head>
<body>

<div class="header">
  <h1>{{HEADER_TITLE}}</h1>
  <div class="meta">{{HEADER_META}}</div>
</div>

{{ITEMS}}

{{FILTERED}}

{{VIDEOS}}

<div class="footer">
  {{FOOTER_TEXT}}
</div>

</body>
</html>
